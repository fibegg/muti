run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose
    - nilerr

linters-settings:
  goimports:
    local-prefixes: github.com/fibegg/muti
  misspell:
    locale: US

issues:
  exclude-rules:
    # Allow unused parameters in operator Apply methods (interface conformance)
    - linters: [unused]
      text: "parameter '(tree|lang)' seems to be unused"
    # Allow fmt.Fprintf to stderr without checking error
    - linters: [errcheck]
      text: "Fprintf"
